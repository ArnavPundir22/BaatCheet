<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#ff00ea" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="512" height="512" rx="112" fill="#050510"/>
  
  <!-- Outer glowing border to mimic glass panel -->
  <rect x="20" y="20" width="472" height="472" rx="92" fill="#0A0A19" stroke="url(#grad)" stroke-width="4" opacity="0.8" filter="url(#glow)" />
  
  <!-- Inner dark glass fill -->
  <rect x="20" y="20" width="472" height="472" rx="92" fill="#0A0A19" opacity="0.9" />

  <!-- The stylized 'A' -->
  <path d="M 256 120 L 382 400 L 312 400 L 287 340 L 225 340 L 200 400 L 130 400 Z M 256 180 L 235 280 L 277 280 Z" fill="url(#grad)" filter="url(#glow)"/>
  
  <!-- Sharp 'A' overlay -->
  <path d="M 256 120 L 382 400 L 312 400 L 287 340 L 225 340 L 200 400 L 130 400 Z M 256 180 L 235 280 L 277 280 Z" fill="url(#grad)"/>
</svg>
