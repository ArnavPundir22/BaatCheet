<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaatCheet | Ephemeral Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
</head>

<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container index-container">
        <div class="glass-panel">
            <h1 class="logo-title">BaatCheet</h1>
            <p class="subtitle">Ephemeral, Instant Video & Text Chat</p>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form action="{{ url_for('index') }}" method="POST" class="auth-form">
                <div class="input-group">
                    <label for="username">Your Name</label>
                    <input type="text" id="username" name="username" placeholder="Enter your display name" required
                        autocomplete="off">
                </div>

                <div class="actions">
                    <div class="action-card">
                        <h3>Start a New Conversation</h3>
                        <p>Create a fresh, disposable room.</p>
                        <button type="submit" name="action" value="create" class="btn btn-primary">Create Room</button>
                    </div>

                    <div class="divider"><span>OR</span></div>

                    <div class="action-card">
                        <h3>Join Existing Room</h3>
                        <p>Enter a code shared with you.</p>
                        <div class="join-group">
                            <input type="text" name="room_code" placeholder="Room Code (e.g. A7X9Q2)"
                                autocomplete="off">
                            <button type="submit" name="action" value="join" class="btn btn-secondary">Join</button>
                        </div>
                    </div>
                </div>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="{{ url_for('about') }}" style="color: var(--text-muted); text-decoration: underline; font-size: 0.9rem; transition: color 0.3s ease;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">About BaatCheet</a>
            </div>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful');
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
