<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room {{ room_code }} | BaatCheet</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=11">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script>
        const ROOM_CODE = "{{ room_code }}";
        const USERNAME = "{{ username }}";
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
</head>

<body class="room-body">
    <!-- Background Blobs for Glassmorphism -->
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="room-container">

        <!-- Main Video Area -->
        <main class="video-area">
            <header class="room-header">
                <h2>Room: <span class="highlight">{{ room_code }}</span></h2>
                <div class="controls">
                    <button id="toggle-audio" class="btn btn-icon active">🎤</button>
                    <button id="toggle-video" class="btn btn-icon active">📷</button>

                    <div class="reaction-container">
                        <button id="toggle-reaction" class="btn btn-icon">😊</button>
                        <div id="reaction-panel" class="reaction-panel">
                            <button class="reaction-emoji" data-emoji="👍">👍</button>
                            <button class="reaction-emoji" data-emoji="❤️">❤️</button>
                            <button class="reaction-emoji" data-emoji="😂">😂</button>
                            <button class="reaction-emoji" data-emoji="🎉">🎉</button>
                            <button class="reaction-emoji" data-emoji="😘">😘</button>
                            <button class="reaction-emoji" data-emoji="🫣">🫣</button>
                            <button class="reaction-emoji" data-emoji="🤫">🤫</button>
                            <button class="reaction-emoji" data-emoji="🫂">🫂</button>
                            <button class="reaction-emoji" data-emoji="😅">😅</button>
                            <button class="reaction-emoji" data-emoji="🥲">🥲</button>
                            <button class="reaction-emoji" data-emoji="😭">😭</button>
                            <button class="reaction-emoji" data-emoji="🤣">🤣</button>
                            <button class="reaction-emoji" data-emoji="😢">😢</button>
                            <button class="reaction-emoji" data-emoji="🤔">🤔</button>
                            <button class="reaction-emoji" data-emoji="👏">👏</button>
                            <button class="reaction-emoji" data-emoji="🤢">🤢</button>
                            <button class="reaction-emoji" data-emoji="😡">😡</button>
                            <button class="reaction-emoji" data-emoji="😇">😇</button>
                        </div>
                    </div>

                    <button id="invite-btn" class="btn btn-icon" title="Copy Invite Link">🔗</button>
                    <button id="leave-room" class="btn btn-danger">Leave</button>
                </div>
            </header>

            <div id="video-grid" class="video-grid">
                <div class="video-wrapper local-wrapper">
                    <video id="local-video" autoplay muted playsinline></video>
                    <span class="video-label">{{ username }} (You)</span>
                </div>
                <!-- Remote videos will be injected here -->
            </div>
        </main>

        <!-- Sidebar Chat -->
        <aside class="chat-sidebar glass-panel-light">
            <div class="chat-header">
                <h3>Live Chat</h3>
                <span class="mobile-room-code">Room: <span class="highlight">{{ room_code }}</span></span>
            </div>

            <div id="chat-messages" class="chat-messages">
                <!-- Messages will be injected here -->
                <div id="typing-indicator" class="typing-indicator">
                    <span class="typing-text"></span>
                    <div class="dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="file" id="image-upload" accept="image/*" style="display: none;">
                <button id="image-btn" class="btn btn-icon" title="Send View-Once Image">🖼️</button>
                <button id="audio-btn" class="btn btn-icon" title="Hold to Record Audio">🎙️</button>
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
        </aside>

    </div>

    <!-- View-Once Image Viewer -->
    <div id="image-viewer-overlay" class="modal-overlay">
        <div class="image-viewer-content">
            <span class="close-viewer" id="close-viewer">&times;</span>
            <img id="viewer-img" src="" alt="View Once Image">
        </div>
    </div>

    <!-- WebRTC and Chat Logic -->
    <script src="{{ url_for('static', filename='js/room.js') }}?v=11"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful');
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
