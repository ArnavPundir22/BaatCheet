<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>{{ room_name }} | BaatCheet</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=14">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>

    <script>
        const ROOM_CODE = "{{ room_code }}";
        const USERNAME = "{{ username }}";
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
</head>

<body class="room-body">
    <!-- Background for Terminal Aesthetic -->
    <div class="wireframe-grid"></div>

    <div class="room-container">

        <!-- Main Video Area -->
        <main class="video-area">
            <header class="room-header">
                <h2>{{ room_name }} <span class="font-mono"
                        style="font-size: 0.6em; color: var(--text-muted); font-weight: normal; margin-left: 10px;">[ID]:
                        <span class="highlight">{{ room_code }}</span></span></h2>
                <div class="controls">
                    <button id="toggle-audio" class="btn btn-icon active"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg></button>
                    <button id="toggle-video" class="btn btn-icon active"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg></button>
                    <button id="share-screen" class="btn btn-icon" title="Share Screen"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="14" x="3" y="3" rx="2" ry="2"></rect><path d="M8 21h8"></path><path d="M12 17v4"></path><path d="m8 10 4-4 4 4"></path><path d="M12 6v8"></path></svg></button>

                    <div class="reaction-container">
                        <button id="toggle-reaction" class="btn btn-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" x2="9.01" y1="9" y2="9"></line><line x1="15" x2="15.01" y1="9" y2="9"></line></svg></button>
                        <div id="reaction-panel" class="reaction-panel">
                            <button class="reaction-emoji" data-emoji="👍">👍</button>
                            <button class="reaction-emoji" data-emoji="❤️">❤️</button>
                            <button class="reaction-emoji" data-emoji="😂">😂</button>
                            <button class="reaction-emoji" data-emoji="🎉">🎉</button>
                            <button class="reaction-emoji" data-emoji="😘">😘</button>
                            <button class="reaction-emoji" data-emoji="🫣">🫣</button>
                            <button class="reaction-emoji" data-emoji="🤫">🤫</button>
                            <button class="reaction-emoji" data-emoji="🫂">🫂</button>
                            <button class="reaction-emoji" data-emoji="😅">😅</button>
                            <button class="reaction-emoji" data-emoji="🥲">🥲</button>
                            <button class="reaction-emoji" data-emoji="😭">😭</button>
                            <button class="reaction-emoji" data-emoji="🤣">🤣</button>
                            <button class="reaction-emoji" data-emoji="😢">😢</button>
                            <button class="reaction-emoji" data-emoji="🤔">🤔</button>
                            <button class="reaction-emoji" data-emoji="👏">👏</button>
                            <button class="reaction-emoji" data-emoji="🤢">🤢</button>
                            <button class="reaction-emoji" data-emoji="😡">😡</button>
                            <button class="reaction-emoji" data-emoji="😇">😇</button>
                        </div>
                    </div>

                    <button id="invite-btn" class="btn btn-icon" title="Copy Invite Link"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg></button>
                    <button id="theme-btn" class="btn btn-icon" title="Themes">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M12 22a1 1 0 0 1 0-20 10 9 0 0 1 10 9 5 5 0 0 1-5 5h-2.25a1.75 1.75 0 0 0-1.4 2.8l.3.4a1.75 1.75 0 0 1-1.4 2.8z">
                            </path>
                            <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"></circle>
                            <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"></circle>
                            <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"></circle>
                            <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"></circle>
                        </svg>
                    <!-- </button>
                    <button id="leave-room" class="btn btn-danger">Leave</button> -->
                    <button id="leave-room" class="btn btn-danger">
                        <span class="leave-text">Leave</span>
                        <svg class="leave-icon"
                            xmlns="http://www.w3.org/2000/svg"
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div id="video-grid" class="video-grid">
                <div class="video-wrapper local-wrapper">
                    <video id="local-video" autoplay muted playsinline></video>
                    <span class="video-label">{{ username }} (You)</span>
                </div>
                <!-- Remote videos will be injected here -->
            </div>
        </main>

        <!-- Sidebar Chat -->
        <aside class="chat-sidebar glass-panel-light">
            <div class="chat-header">
                <h3>{{ room_name }}</h3>
                <span class="mobile-room-code font-mono">[ID]: <span class="highlight">{{ room_code }}</span></span>
            </div>

            <div class="zero-log-banner font-mono" style="font-size: 0.75rem; text-transform: uppercase;">
                <span>🔒 [SYS.SECURE] Zero-Log Mode Active.</span>
            </div>

            <div id="chat-messages" class="chat-messages">
                <!-- Messages will be injected here -->
                <div id="typing-indicator" class="typing-indicator">
                    <span class="typing-text"></span>
                    <div class="dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>

            <div id="reply-preview" class="reply-preview" style="display: none;">
                <div class="reply-content">
                    <span id="reply-preview-user" class="reply-user"></span>
                    <span id="reply-preview-text" class="reply-text"></span>
                </div>
                <button id="cancel-reply-btn" class="btn btn-icon cancel-reply" title="Cancel Reply">&times;</button>
            </div>

            <div class="chat-input-area">
                <input type="file" id="image-upload" accept="image/*" style="display: none;">
                <button id="image-btn" class="btn btn-icon" title="Send View-Once Image"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><circle cx="9" cy="9" r="2"></circle><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path></svg></button>
                <button id="audio-btn" class="btn btn-icon" title="Hold to Record Audio"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg></button>
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn" class="btn btn-primary font-mono" style="text-transform: uppercase;">Send</button>
            </div>
        </aside>

    </div>

    <!-- View-Once Image Viewer -->
    <div id="image-viewer-overlay" class="modal-overlay">
        <div class="image-viewer-content">
            <span class="close-viewer" id="close-viewer">&times;</span>
            <img id="viewer-img" src="" alt="View Once Image" draggable="false" oncontextmenu="return false;">
        </div>
    </div>

    <!-- Purge Overlay -->
    <div id="purge-overlay" class="purge-overlay">
        <div class="purge-content">
            <div class="glitch-spinner"></div>
            <h2>Purging room data...</h2>
            <p>Destroying temporary session.</p>
        </div>
    </div>

    <!-- Theme Modal -->
    <div id="theme-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content glass-panel">

            <h3>🎨 Personalize BaatCheet</h3>
            <p>Choose how your BaatCheet looks.</p>

            <div class="theme-list">
                <button class="theme-card theme-option" data-theme="aurora"> ✓ Aurora </button>
                <button class="theme-card theme-option" data-theme="midnightRomance"> 💖 Midnight Romance </button>
                <button class="theme-card theme-option" data-theme="sunsetGlow"> 🌅 Sunset Glow</button>
                <button class="theme-card theme-option" data-theme="cyberNeon"> ⚡ Cyber Neon </button>
                <button class="theme-card theme-option" data-theme="coffeeHouse"> ☕ Coffee House </button>
                <button class="theme-card theme-option" data-theme="minimalBlack"> 🖤 Minimal Black </button>
            </div>
            <div class="modal-actions">
                <button id="close-theme-modal" class="btn btn-danger"> Close </button>
            </div>
        </div>
    </div>

    <!-- Theme Engine -->
    <script src="{{ url_for('static', filename='js/themes.js') }}"></script>

    <!-- WebRTC and Chat Logic -->
    <script src="{{ url_for('static', filename='js/room.js') }}?v=11"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful');
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>

</body>

</html>
